<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atom — Pair Template</title>
  <style>

</head>
<body>
  <main class="frame">
    <header class="page-header">
      <h1>Atom</h1>
      <div class="subtitle">Reusable paired image/text layout</div>
    </header>

    <!-- First pair block -->
    <section class="pair-block">
      <div class="pair-grid">

        <!-- Left panel -->
        <article class="panel">
          <div class="panel-inner">
            <div class="image-wrap">
              <img src="images/atom-left.jpg" alt="Atom left example image" />
            </div>

            <div class="notes">
              <p><span class="bullet">•</span> Facsimile of the <a href="#">cover</a> of the report completed in <a href="#">February 1966</a></p>
              <p><span class="bullet">▪</span> Click <a href="#">here</a> to read a facsimile of the full <a href="#">report</a></p>
              <div class="button-row">
                <a class="buttonlink" href="#">Learn More</a>
                <a class="buttonlink" href="#">PDF</a>
              </div>
            </div>
          </div>
        </article>

        <!-- Right panel -->
        <article class="panel">
          <div class="panel-inner">
            <div class="image-wrap">
              <img src="images/atom-right.jpg" alt="Atom right example image" />
            </div>

            <div class="notes">
              <p><span class="bullet">•</span> Facsimile of the <a href="#">cover</a> of the article published in <a href="#">October 1966</a></p>
              <p><span class="bullet">▪</span> Click <a href="#">here</a> to read a facsimile of the full article</p>
              <div class="button-row">
                <a class="buttonlink" href="#">Learn More</a>
                <a class="buttonlink" href="#">PDF</a>
              </div>
            </div>
          </div>

          <div class="callout small">
            <strong>nb</strong> Both <a href="#">documents</a> are in PDF form and can therefore be downloaded.
          </div>
        </article>

      </div>
    </section>

  </main>
</body>
</html>
